# Configuration file for object tracking system

# Detector Configuration
detector:
  model_name: "yolo11n.pt"    # YOLO model: yolo11n/s/m/l/x (needs ultralytics>=8.3),
                              # yolov8n/s/m/l/x, or *-worldv2 for open-vocab
  confidence_threshold: 0.20  # Minimum confidence for detections
  image_size: 640             # Input image size
  device: "auto"              # Device: "auto", "cuda", or "cpu"
  use_half: true              # Use FP16 half precision on GPU
  target_classes: null        # null = detect ALL 80 COCO classes
  # To detect only specific COCO classes:
  # target_classes:
  #   - "person"
  #   - "cell phone"
  #   - "car"
  #   - "tie"
  #
  # To detect objects NOT in COCO (automatically uses YOLO-World):
  # target_classes:
  #   - "person"
  #   - "pen"
  #   - "screwdriver"
  #   - "tie"
  #   - "hammer"
  #   - "wrench"
  #   - "pliers"
  #   - "glasses"

# Tracker Configuration
tracker:
  max_age: 30          # Maximum frames to keep track without detection
  min_hits: 3          # Minimum hits before track confirmation
  iou_threshold: 0.3   # IOU threshold for matching detections to tracks
  class_aware: true    # Only match detections to tracks of the same class
  track_high_thresh: 0.5  # Detections >= this match first and may spawn tracks (ByteTrack high pool)
  track_low_thresh: 0.1   # Detections in [low, high) only recover existing tracks (ByteTrack low pool)

# Visualization Configuration
visualization:
  show_trails: false        # Show track trails/trajectories

# Video Processing Configuration
video:
  output_path: null         # Output video path (null = no output)
  display: true             # Display video during processing
  fps_limit: null           # Cap processing FPS (e.g. play files at real time)
  webcam_width: 1280        # Requested webcam capture width
  webcam_height: 720        # Requested webcam capture height
  webcam_fps: 30            # Requested webcam capture FPS
