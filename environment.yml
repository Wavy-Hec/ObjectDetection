# Conda users: this creates an env and installs FlowCount (editable) with all
# extras via pip, so pyproject.toml stays the single source of truth for deps.
# Plain pip users can skip conda entirely: pip install -e ".[yolo,web,demo,dev]"
name: flowcount
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      - -e .[yolo,web,demo,dev]
